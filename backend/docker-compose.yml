services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/app/app
      - ./examples:/app/examples

  worker:
    build: .
    env_file:
      - .env
    depends_on:
      - redis
    command: celery -A app.worker.celery_app.celery_app worker --loglevel=info
    volumes:
      - ./app:/app/app
      - ./examples:/app/examples
