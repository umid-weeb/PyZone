global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert-rules.yaml"

scrape_configs:
  - job_name: 'pyzone-api'
    static_configs:
      - targets: ['api-service:8000']
  
  - job_name: 'pyzone-judge-worker'
    static_configs:
      - targets: ['judge-worker:8081']
      
  - job_name: 'node-exporter'
    kubernetes_sd_configs:
      - role: node