<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Pyzone Arena</title>
  <link rel="stylesheet" href="./arena/arena.css">
</head>

<body class="auth-shell">
  <div class="auth-card">
    <h1>Login</h1>
    <div class="auth-field">
      <label for="username">Username</label>
      <input id="username" type="text" autocomplete="username">
    </div>
    <div class="auth-field">
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password">
    </div>
    <button id="login-btn" class="arena-button button-submit" type="button">Login</button>
    <div id="auth-status" class="auth-status"></div>
    <p>New here? <a href="/register.html">Create account</a></p>
  </div>
  <script type="module">
    import { login } from "./js/auth.js";
    const statusEl = document.getElementById("auth-status");
    const btn = document.getElementById("login-btn");
    btn.addEventListener("click", async () => {
      statusEl.textContent = "";
      btn.disabled = true;
      btn.textContent = "Logging in...";
      try {
        const next = new URLSearchParams(window.location.search).get("next") || "/arena.html";
        const response = await login(
          document.getElementById("username").value.trim(),
          document.getElementById("password").value
        );

        // Sometimes the ticket is hidden in the box. 
        // Let's make sure we find it and put it in our pocket!
        const ticket = response?.access_token || response?.token || response?.jwt;
        if (ticket && ticket !== "undefined") {
          localStorage.setItem("userToken", ticket);
          localStorage.setItem("arena_jwt", ticket);
          localStorage.setItem("access_token", ticket);
        }

        // Handle pending actions after login
        const pending = new URLSearchParams(window.location.search).get("pending");
        const problem = new URLSearchParams(window.location.search).get("problem");

        if (pending === "submit" && problem) {
          // Redirect to arena with pending action
          window.location.href = `/arena.html?problem=${encodeURIComponent(problem)}&pending=submit`;
        } else {
          window.location.href = next;
        }
      } catch (error) {
        statusEl.textContent = "Login failed";
      } finally {
        btn.disabled = false;
        btn.textContent = "Login";
      }
    });

    // Handle submit login flow
    const pending = new URLSearchParams(window.location.search).get("pending");
    const problem = new URLSearchParams(window.location.search).get("problem");

    if (pending === "submit" && problem) {
      // Show custom message for submit login flow
      const message = document.createElement("div");
      message.className = "auth-message";
      message.textContent = "Masalani yuborish uchun avval tizimga kiring.";
      message.style.color = "#007bff";
      message.style.marginTop = "10px";
      message.style.fontWeight = "500";
      document.querySelector(".auth-card").appendChild(message);
    }
  </script>
</body>

</html>
