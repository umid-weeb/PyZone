<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Pyzone Arena</title>
  <link rel="stylesheet" href="./arena/arena.css">
</head>
<body class="auth-shell">
  <div class="auth-card">
    <h1>Login</h1>
    <div class="auth-field">
      <label for="username">Username</label>
      <input id="username" type="text" autocomplete="username">
    </div>
    <div class="auth-field">
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password">
    </div>
    <button id="login-btn" class="arena-button button-submit" type="button">Login</button>
    <div id="auth-status" class="auth-status"></div>
    <p>New here? <a href="/register.html">Create account</a></p>
  </div>
  <script type="module">
    import { login } from "./js/auth.js";
    const statusEl = document.getElementById("auth-status");
    const btn = document.getElementById("login-btn");
    btn.addEventListener("click", async () => {
      statusEl.textContent = "";
      btn.disabled = true;
      btn.textContent = "Logging in...";
      try {
        const next = new URLSearchParams(window.location.search).get("next") || "/arena.html";
        await login(
          document.getElementById("username").value.trim(),
          document.getElementById("password").value
        );
        window.location.href = next;
      } catch (error) {
        statusEl.textContent = "Login failed";
      } finally {
        btn.disabled = false;
        btn.textContent = "Login";
      }
    });
  </script>
</body>
</html>
