version: '3.8'

services:
  # ---------------------------------------------
  # 1. INFRASTRUCTURE (DB, Cache, Queue)
  # ---------------------------------------------
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: pyzone
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  kafka:
    image: bitnami/kafka:latest
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
    ports:
      - "9092:9092"

  # ---------------------------------------------
  # 2. API GATEWAY (Traefik)
  # ---------------------------------------------
  api-gateway:
    image: traefik:v2.10
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "8000:80"      # Asosiy API port
      - "8080:8080"    # Traefik Dashboard (monitoring uchun)
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  # ---------------------------------------------
  # 3. MICROSERVICES
  # ---------------------------------------------
  auth-service:
    build: ./services/auth-service
    environment:
      - DB_URL=postgres://postgres:secretpassword@postgres:5432/pyzone?search_path=auth
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=PathPrefix(`/api/auth`, `/api/users`)"

  problem-service:
    build: ./services/problem-service
    environment:
      - DB_URL=postgres://postgres:secretpassword@postgres:5432/pyzone?search_path=problems
      - REDIS_URL=redis://redis:6379
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.problems.rule=PathPrefix(`/api/problems`)"

  ai-service:
    build: ./services/ai-service
    environment:
      - REDIS_URL=redis://redis:6379
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai.rule=PathPrefix(`/api/hints`, `/api/review`, `/api/learning-path`)"

  judge-service:
    build: ./services/judge-service
    environment:
      - KAFKA_BROKER=kafka:9092