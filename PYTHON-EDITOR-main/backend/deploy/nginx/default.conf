server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /zone/ {
        return 301 /zone$is_args$args;
    }

    location = /zone {
        try_files /arena-spa/index.html =404;
    }

    location = /arena.html {
        return 301 /zone$is_args$args;
    }

    location = /login/ {
        return 301 /login$is_args$args;
    }

    location = /login {
        try_files /arena-spa/index.html =404;
    }

    location = /login.html {
        return 301 /login$is_args$args;
    }

    location = /register/ {
        return 301 /register$is_args$args;
    }

    location = /register {
        try_files /arena-spa/index.html =404;
    }

    location = /register.html {
        return 301 /register$is_args$args;
    }

    location = /profile/ {
        return 301 /profile$is_args$args;
    }

    location = /profile {
        try_files /arena-spa/index.html =404;
    }

    location = /profile.html {
        return 301 /profile$is_args$args;
    }

    location = /submissions/ {
        return 301 /submissions$is_args$args;
    }

    location = /submissions {
        try_files /arena-spa/index.html =404;
    }

    location = /submissions.html {
        return 301 /submissions$is_args$args;
    }

    location = /leaderboard/ {
        return 301 /leaderboard$is_args$args;
    }

    location = /leaderboard {
        try_files /arena-spa/index.html =404;
    }

    location = /leaderboard.html {
        return 301 /leaderboard$is_args$args;
    }

    location = /settings/ {
        return 301 /settings$is_args$args;
    }

    location = /settings {
        try_files /arena-spa/index.html =404;
    }

    location = /settings.html {
        return 301 /settings$is_args$args;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    location /health {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
